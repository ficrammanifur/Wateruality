<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart RO Water Quality Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.0.0/dist/mqtt.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>
                <span class="emoji">💧</span>
                Smart RO Monitor
                <span id="connectionStatus" class="badge badge-warning">● Connecting...</span>
            </h1>
            <div class="status-header">
                <span id="mqttStatus" class="status-badge offline">MQTT: Offline</span>
                <span id="espStatus" class="status-badge offline">ESP32: Offline</span>
                <span id="lastUpdate">⏱️ --:--:--</span>
            </div>
        </header>

        <!-- GRID CARDS (sama seperti sebelumnya) -->
        <div class="grid">
            <div class="card card-status"> ... </div>
            <div class="card card-health"> ... </div>
            <!-- Sisanya sama seperti index.html lama kamu -->
            <!-- (Copy bagian grid cards dari kode lama kamu) -->
        </div>

        <!-- CHARTS -->
        <div class="charts-container">
            <div class="chart-card">
                <div class="card-title">📈 Grafik pH Real-Time</div>
                <div class="chart-wrapper"><canvas id="phChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="card-title">📈 Grafik TDS Real-Time</div>
                <div class="chart-wrapper"><canvas id="tdsChart"></canvas></div>
            </div>
        </div>

        <footer>
            <span id="dataCount">📊 0 data points</span>
            <span id="lastMessage">📨 Last message: --</span>
            <span id="filterStatus">🔧 Filter: --</span>
        </footer>
    </div>

    <script>
        // ==================== MQTT CONFIG ====================
        const MQTT_BROKER = "wss://broker.hivemq.com:8884/mqtt";
        const MQTT_TOPIC = "watermon/all";

        let client = null;
        let messageCount = 0;

        // DOM Elements
        const DOM = {
            connectionStatus: document.getElementById('connectionStatus'),
            mqttStatus: document.getElementById('mqttStatus'),
            espStatus: document.getElementById('espStatus'),
            lastUpdate: document.getElementById('lastUpdate'),
            dataCount: document.getElementById('dataCount'),
            lastMessage: document.getElementById('lastMessage'),
            waterStatus: document.getElementById('waterStatus'),
            statusDetail: document.getElementById('statusDetail'),
            filterHealth: document.getElementById('filterHealth'),
            healthBar: document.getElementById('healthBar'),
            daysLeft: document.getElementById('daysLeft'),
            volumeTotal: document.getElementById('volumeTotal'),
            phValue: document.getElementById('phValue'),
            tdsValue: document.getElementById('tdsValue'),
            turbidityValue: document.getElementById('turbidityValue'),
            tempValue: document.getElementById('tempValue'),
            flowRate: document.getElementById('flowRate'),
            volumeValue: document.getElementById('volumeValue')
        };

        let charts = null;

        // ==================== INIT CHARTS ====================
        function initCharts() {
            charts = {
                ph: new Chart(document.getElementById('phChart'), {
                    type: 'line',
                    data: { labels: [], datasets: [{ label: 'pH', data: [], borderColor: '#4299e1', tension: 0.4, fill: true }] },
                    options: { responsive: true, scales: { y: { min: 0, max: 14 } } }
                }),
                tds: new Chart(document.getElementById('tdsChart'), {
                    type: 'line',
                    data: { labels: [], datasets: [{ label: 'TDS', data: [], borderColor: '#48bb78', tension: 0.4, fill: true }] },
                    options: { responsive: true, scales: { y: { min: 0, max: 500 } } }
                })
            };
        }

        // ==================== MQTT CONNECTION ====================
        function connectToMQTT() {
            console.log("🔌 Connecting to HiveMQ...");

            client = mqtt.connect(MQTT_BROKER, {
                clientId: 'dashboard_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 5000,
                reconnectPeriod: 3000,
                keepalive: 60
            });

            client.on("connect", () => {
                console.log("✅ Connected to MQTT Broker!");
                DOM.mqttStatus.textContent = "MQTT: Online";
                DOM.mqttStatus.className = "status-badge online";
                DOM.connectionStatus.textContent = "● Online";
                DOM.connectionStatus.className = "badge badge-success";

                client.subscribe(MQTT_TOPIC, (err) => {
                    if (!err) console.log(`📡 Subscribed to ${MQTT_TOPIC}`);
                });
            });

            client.on("message", (topic, message) => {
                try {
                    const data = JSON.parse(message.toString());
                    console.log("📨 Data received:", data);
                    
                    messageCount++;
                    DOM.dataCount.textContent = `📊 ${messageCount} data points`;
                    DOM.lastMessage.textContent = `📨 Last: ${new Date().toLocaleTimeString('id-ID')}`;

                    updateDashboard(data);
                    updateCharts(data);
                } catch (e) {
                    console.error("Parse error:", e);
                }
            });

            client.on("error", (err) => {
                console.error("❌ MQTT Error:", err);
            });

            client.on("reconnect", () => {
                console.log("🔄 Reconnecting...");
            });
        }

        // ==================== UPDATE DASHBOARD ====================
        function updateDashboard(data) {
            DOM.lastUpdate.textContent = `⏱️ ${new Date().toLocaleTimeString('id-ID')}`;

            if (data.ph) DOM.phValue.textContent = data.ph.toFixed(2);
            if (data.tds) DOM.tdsValue.textContent = data.tds.toFixed(0);
            if (data.turbidity) DOM.turbidityValue.textContent = data.turbidity.toFixed(0);
            if (data.temperature) DOM.tempValue.textContent = data.temperature.toFixed(1);
            if (data.flow_rate) DOM.flowRate.textContent = data.flow_rate.toFixed(1);
            if (data.volume) {
                DOM.volumeValue.textContent = data.volume.toFixed(1);
                DOM.volumeTotal.textContent = `💧 ${data.volume.toFixed(1)} L`;
            }

            // Status Air
            const statusText = DOM.waterStatus.querySelector('.status-text') || DOM.waterStatus;
            if (data.status === 'LAYAK') {
                statusText.textContent = 'LAYAK';
                statusText.style.color = '#48bb78';
            } else {
                statusText.textContent = 'TIDAK LAYAK';
                statusText.style.color = '#fc8181';
            }
        }

        function updateCharts(data) {
            const now = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            if (data.ph && charts) {
                charts.ph.data.labels.push(now);
                charts.ph.data.datasets[0].data.push(data.ph);
                if (charts.ph.data.labels.length > 60) charts.ph.data.labels.shift(), charts.ph.data.datasets[0].data.shift();
                charts.ph.update('none');
            }
            if (data.tds && charts) {
                charts.tds.data.labels.push(now);
                charts.tds.data.datasets[0].data.push(data.tds);
                if (charts.tds.data.labels.length > 60) charts.tds.data.labels.shift(), charts.tds.data.datasets[0].data.shift();
                charts.tds.update('none');
            }
        }

        // ==================== START ====================
        document.addEventListener("DOMContentLoaded", () => {
            console.log("🚀 Smart RO Dashboard Started");
            initCharts();
            connectToMQTT();
        });
    </script>
</body>
</html>
